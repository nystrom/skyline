        justify-content: center;

        min-height: 100vh;

      /* Phone Frame Wrapper */
      .phone-container {
        position: relative;
        width: 390px;
        height: 844px;
        background: #000;
        border-radius: 50px;
        padding: 12px;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), 0 0 0 12px #222;
        box-sizing: border-box;
      }

      .phone-screen {
        position: relative;
        width: 100%;
        height: 100%;
        background-color: var(--sky-bg);
        border-radius: 40px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .dynamic-island {
        position: absolute;
        top: 15px;
        left: 50%;
        transform: translateX(-50%);
        width: 110px;
        height: 30px;
        background: #000;
        border-radius: 20px;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .dynamic-island-camera {
        width: 10px;
        height: 10px;
        background: #111;
        border-radius: 50%;
        margin-left: auto;
        margin-right: 15px;
        box-shadow: inset 0 0 3px rgba(255,255,255,0.2);
      }

      .home-indicator {
        position: absolute;
        bottom: 8px;
        left: 50%;
        transform: translateX(-50%);
        width: 140px;
        height: 5px;
        background: rgba(255, 255, 255, 0.5);
        border-radius: 10px;
        z-index: 1000;
        pointer-events: none;
      }

      /* Animations */
      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      .animate-spin-slow {
        animation: spin-slow 20s linear infinite;
      }

      @keyframes pulse-slow {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 0.4; }
      }
      .animate-pulse-slow {
        animation: pulse-slow 3s ease-in-out infinite;
      }

      .scrollbar-none::-webkit-scrollbar {
        display: none;
      }
      .scrollbar-none {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      .animate-fade-in {
        animation: fadeIn 0.2s ease-out forwards;
      }

      @keyframes slideIn {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      .animate-slide-in {
        animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes pageFadeIn {
        from { opacity: 0; transform: translateY(8px); }

      }

      // Utility Functions
      function convertTemp(c, unit) {
        if (unit === 'F') return Math.round((c * 9) / 5 + 32);
        return Math.round(c);
      }

      function convertWindSpeed(speedMs, unit) {
        switch (unit) {
          case 'kph':
            return Math.round(speedMs * 3.6);
          case 'mph':
            return Math.round(speedMs * 2.23694);
          case 'knots':
            return Math.round(speedMs * 1.94384);
          case 'm/s':
          default:
            return Math.round(speedMs);
        }
      }

      function convertPrecip(mm, unit) {
        if (unit === 'cm/h') return (mm / 10).toFixed(2);
        if (unit === 'in/h') return (mm / 25.4).toFixed(2);
        return mm.toFixed(1);
      }

      function getWindUnitLabel(unit) {
        switch (unit) {
          case 'kph': return 'km/h';
          case 'mph': return 'mph';
          case 'knots': return 'kt';
          case 'm/s':
          default: return 'm/s';
        }
      }

      function windDegToRotation(deg) {
        return (deg + 135) % 360;
      }

      function humanizeDur(min) {
        if (min <= 0) return 'now';
        const hh = Math.floor(min / 60);
        const mm = min % 60;
        if (hh && mm) return `${hh}h ${mm}m`;
        if (hh) return `${hh}h`;
        return `${mm}m`;
      }

      function intensityLabel(mm) {
        if (!mm || mm <= 0) return null;
        if (mm < 1) return 'Light';
        if (mm < 4) return 'Moderate';
        if (mm < 8) return 'Heavy';
        return 'Torrential';
      }

        return Math.max(0, Math.min(1, (mm || 0) / 8));

      // Generate 48 hourly events for simulated cities
      const generateHourlyEvents = (cityKey, cityData) => {
        const events = [];
        const baseTemp = cityData.current.temp;
        const kind = cityData.current.kind;
        const now = new Date();
        const startHour = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), 0, 0, 0);

        for (let i = 0; i < 48; i++) {
          const hourTime = new Date(startHour.getTime() + 3600000 * i);
          const hourNum = hourTime.getHours();
          const tempOffset = Math.sin((hourNum - 6) / 24 * 2 * Math.PI) * 4;
          const temp = Math.round(baseTemp + tempOffset);

          let precipProb = 0;
          let precipAccum = 0;

          if (kind.includes("Rain") || kind.includes("Showers") || kind === "Thunderstorm") {
            precipProb = Math.round(70 + Math.sin(i / 6) * 25);
            precipAccum = Math.max(0, 0.5 + Math.sin(i / 4) * 3 + (kind === "Thunderstorm" ? 4 : 0));
          } else if (kind.includes("Snow")) {
            precipProb = Math.round(80 + Math.sin(i / 6) * 15);
            precipAccum = Math.max(0, 0.4 + Math.sin(i / 4) * 2);
          } else if (kind === "PartlyCloudy") {
            precipProb = Math.max(0, Math.round(15 + Math.sin(i / 3) * 15));
            precipAccum = precipProb > 25 ? 0.2 : 0;
          }

          events.push({
            type: "hourly_status",
            time: hourTime,
            temp,
            precipProb,
            precipAccum: parseFloat(precipAccum.toFixed(1)),
            windSpeed: cityData.current.windSpeed + Math.sin(i / 5) * 2,
            windDeg: (cityData.current.windDeg + i * 5) % 360,
            kind: precipAccum > 1.5 ? (kind.includes("Snow") ? "SnowHeavy" : "RainHeavy") : (precipAccum > 0 ? "RainLight" : (hourNum >= 21 || hourNum < 6 ? "Clear" : "Clear"))
          });
        }
        return events;
      };

      // Populate timelineEvents for all cities
      Object.keys(CITIES_DATA).forEach(key => {
        const city = CITIES_DATA[key];
        const events = generateHourlyEvents(key, city);
        city.daily[0].timelineEvents = events;
      });

      // Helper functions
      const degreesToCompass = (deg) => {
        const dirs = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
        return dirs[Math.round(deg / 22.5) % 16];
      };

      const kindToIconType = (kind, isNight) => {
        if (!kind) return isNight ? 'clear-night' : 'clear';
        const k = kind.toLowerCase();
        if (k.includes('clear')) return isNight ? 'clear-night' : 'clear';
        if (k.includes('partly')) return isNight ? 'partly-night' : 'partly';
        if (k.includes('mostly') || k.includes('cloudy') || k.includes('overcast')) return 'cloudy';
        if (k.includes('heavy') && k.includes('snow')) return 'snow';
        if (k.includes('snow')) return 'snow';
        if (k.includes('heavy') && k.includes('rain')) return 'heavy';
        if (k.includes('rain') || k.includes('showers') || k.includes('drizzle')) return 'rain';
        if (k.includes('thunderstorm') || k.includes('storm')) return 'storm';
        if (k.includes('fog') || k.includes('mist')) return 'fog';
        return isNight ? 'clear-night' : 'clear';
      };

        const k = kind.toLowerCase();

            soft: 'rgba(255,255,255,0.15)', line: 'rgba(255,255,255,0.22)', glass: 'rgba(255,255,255,0.10)',

            text: 'light', accent: '#a5f3fc',

          };

        if (k.includes('cloudy') || k.includes('overcast')) {
          return {
            grad: 'linear-gradient(170deg, #4b5e78 0%, #6f829c 48%, #93a6bf 100%)',
            text: 'light', accent: '#a1e3ff',

      const formatHourLabel = (date, clockFormat) => {
        return date.toLocaleTimeString('en-US', {
          hour: 'numeric',
          minute: undefined,
          hour12: clockFormat === '12h'
        }).replace(':00', '').trim();
      };

      const formatTimeShort = (date, clockFormat) => {
        if (!date) return '';
        return date.toLocaleTimeString('en-US', {
          hour: 'numeric',
          minute: '2-digit',
          hour12: clockFormat === '12h'
        });
      };

      const adaptWeatherData = (data, clockFormat = '24h') => {
        const now = new Date();
        const isNight = now.getHours() >= 21 || now.getHours() < 6;
        const todayEvents = data.daily[0]?.timelineEvents ?? [];

        const hourly = todayEvents.map(e => {
          const hourNight = e.time.getHours() >= 21 || e.time.getHours() < 6;
          return {
            label: formatHourLabel(e.time, clockFormat),
            dayLabel: e.time.getDate() === now.getDate() ? 'Today' : 'Tomorrow',
            dateStr: e.time.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
            night: hourNight,
            t: e.temp,
            prob: e.precipProb,
            mm: e.precipAccum,
            windMs: e.windSpeed,
            windDeg: e.windDeg,
            cond: kindToIconType(e.kind, hourNight),
            intensity: intensityLabel(e.precipAccum)
          };
        });

        const daily = data.daily.map(d => ({
          day: d.dayName.slice(0,3),
          dateNum: d.date.getDate(),
          cond: kindToIconType(d.kind, false),
          prob: d.precipProb,
          hiC: d.tempMax,
          loC: d.tempMin,
          note: d.description
        }));

        const wetEvents = todayEvents.filter(e => e.precipAccum > 0.1);
        let precip = { kind: 'none', active: false, headline: 'No rain expected', line: 'Clear for the next 12 hours.' };

        if (wetEvents.length > 0) {
          const firstWet = wetEvents[0];
          const lastWet = wetEvents[wetEvents.length - 1];
          const startsInMin = Math.round(Math.max(0, (firstWet.time.getTime() - now.getTime()) / 60000));
          const isActive = startsInMin < 5;
          const peakMm = Math.max(...wetEvents.map(e => e.precipAccum));
          const peakLabel = intensityLabel(peakMm) ?? 'Light';
          const startLabel = isActive ? 'now' : formatHourLabel(firstWet.time, clockFormat);
          const endLabel = formatHourLabel(lastWet.time, clockFormat);
          const durationHours = Math.max(1, Math.round((lastWet.time.getTime() - firstWet.time.getTime()) / 3600000) + 1);
          const durationLabel = durationHours <= 1 ? 'about an hour' : `about ${durationHours} hours`;

          if (isActive) {
            precip = {
              kind: 'rain', active: true,
              startLabel: 'now', endLabel, peakMm, peakLabel,
              headline: `${peakLabel} rain right now`,
              line: `Easing around ${endLabel}.`
            };
          } else {
            precip = {
              kind: 'rain', active: false,
              startsInMin, startLabel, endLabel, durationLabel, peakMm, peakLabel,
              headline: 'Rain starting soon',
              line: `${peakLabel} rain around ${startLabel}, easing by ${endLabel}.`
            };
          }
        }

        const windKmh = data.current.windSpeed * 3.6;
        const sky = kindToSkyGrad(data.current.kind, isNight);

        return {
          place: data.city,
          nowLabel: now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: clockFormat === '12h' }),
          dateLabel: now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }),
          tempC: data.current.temp,
          feelsC: data.current.feelsLike,
          cond: kindToIconType(data.current.kind, isNight),
          condLabel: data.current.description,
          hiC: data.daily[0]?.tempMax ?? data.current.temp,
          loC: data.daily[0]?.tempMin ?? data.current.temp,
          windKmh,
          windDir: degreesToCompass(data.current.windDeg),
          humidity: data.current.humidity,
          sunrise: formatTimeShort(data.current.sunriseTime, clockFormat),
          sunset: formatTimeShort(data.current.sunsetTime, clockFormat),
          sky,
          precip,
          severe: data.current.warnings && data.current.warnings.length > 0 ? {
            title: data.current.warnings[0].event,
            sub: data.current.warnings[0].description,
            detail: `Issued by ${data.current.warnings[0].sender}`
          } : null,
          hourly,
          daily
        };

      const precipPhrase = (s) => {
        const p = s.precip;
        if (!p || p.kind === 'none') {
          return { kind: 'none', big: p ? p.headline : 'No rain expected', sub: p ? p.line : '' };
        }
        if (p.active) {
          return {
            kind: 'active',
            big: (p.peakLabel ?? 'Heavy') + ' rain now',
            sub: 'Easing by ' + (p.endLabel ?? '') + ' · ' + p.line,

        return {
          kind: 'soon',
          big: 'Rain in ' + humanizeDur(p.startsInMin ?? 0),

      const smoothPath = (pts) => {
        if (pts.length < 2) return '';
        let d = `M ${pts[0][0]} ${pts[0][1]}`;
        for (let i = 0; i < pts.length - 1; i++) {
          const p0 = pts[i - 1] ?? pts[i];
          const p1 = pts[i];
          const p2 = pts[i + 1];
          const p3 = pts[i + 2] ?? p2;
          const c1x = p1[0] + (p2[0] - p0[0]) / 6;
          const c1y = p1[1] + (p2[1] - p0[1]) / 6;
          const c2x = p2[0] - (p3[0] - p1[0]) / 6;
          const c2y = p2[1] - (p3[1] - p1[1]) / 6;
          d += ` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${p2[0]} ${p2[1]}`;

      // 1. Classic Design View

      // Minimal view's custom 48h Precip Graph
      function PrecipGraph({ hours, sky, units, precipUnit, gradId }) {
        const [sel, setSel] = useState(null);
        const wrapRef = useRef(null);
        const fmt = (c) => convertTemp(c, units);
        const padX = 8;
        const GW = 330;
        const GH = 150;

        const xs = hours.map((_, i) => padX + (i / Math.max(1, hours.length - 1)) * (GW - padX * 2));

        const maxMm = Math.max(1, ...hours.map((h) => h.mm));
        const iy = (mm) => GH - 18 - (mm / maxMm) * (GH - 46);
        const ipts = hours.map((h, i) => [xs[i], iy(h.mm)]);
        const lastX = xs[xs.length - 1];
        const areaPath = smoothPath(ipts) + ` L ${lastX} ${GH - 18} L ${xs[0]} ${GH - 18} Z`;
        const linePath = smoothPath(ipts);

        const tMin = Math.min(...hours.map((h) => h.t));
        const tMax = Math.max(...hours.map((h) => h.t));
        const tSpan = Math.max(1, tMax - tMin);
        const ty = (t) => 20 + (1 - (t - tMin) / tSpan) * 40;
        const tpath = smoothPath(hours.map((h, i) => [xs[i], ty(h.t)]));

        const firstWet = hours.findIndex((h) => h.mm > 0);

        const dayChanges = [];
        hours.forEach((h, i) => {
          if (i > 0 && h.dayLabel !== hours[i - 1].dayLabel) {
            dayChanges.push({ i, label: h.dayLabel });
          }
        });

        const onScrub = (clientX) => {
          if (!wrapRef.current) return;
          const r = wrapRef.current.getBoundingClientRect();
          const frac = (clientX - r.left) / r.width;
          const idx = Math.round(frac * (hours.length - 1));
          setSel(Math.max(0, Math.min(hours.length - 1, idx)));
        };

        return (
          <div ref={wrapRef} className="relative w-full touch-none select-none"
            onPointerDown={(e) => {
              e.currentTarget.setPointerCapture(e.pointerId);
              onScrub(e.clientX);
            }}
            onPointerMove={(e) => {
              if (e.buttons) onScrub(e.clientX);
            }}
            onPointerUp={(e) => {
              try { e.currentTarget.releasePointerCapture(e.pointerId); } catch (err) {}
              setSel(null);
            }}
            onPointerCancel={(e) => {
              try { e.currentTarget.releasePointerCapture(e.pointerId); } catch (err) {}
              setSel(null);
            }}
          >
            <svg viewBox={`0 0 ${GW} ${GH}`} width="100%" height={GH} className="block overflow-visible">
              <defs>
                <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor={sky.accent} stopOpacity="0.55" />
                  <stop offset="100%" stopColor={sky.accent} stopOpacity="0.02" />
                </linearGradient>
              </defs>

              <line x1={padX} y1={GH - 18} x2={GW - padX} y2={GH - 18} stroke="rgba(255,255,255,0.18)" strokeWidth="1" />

              {dayChanges.map(({ i, label }) => (
                <g key={i}>
                  <line x1={xs[i]} y1={6} x2={xs[i]} y2={GH - 18} stroke="rgba(255,255,255,0.2)" strokeWidth="1" />
                  <text x={xs[i] + 3} y={14} fontSize="9" fill="rgba(255,255,255,0.45)"
                    className="font-sans">{label}</text>
                </g>
              ))}

              {firstWet > 0 && (
                <line x1={xs[firstWet]} y1={6} x2={xs[firstWet]} y2={GH - 18}
                  stroke={sky.accent} strokeWidth="1" strokeDasharray="3 3" opacity="0.7" />
              )}

              <path d={areaPath} fill={`url(#${gradId})`} />
              <path d={linePath} fill="none" stroke={sky.accent} strokeWidth="2.5" strokeLinecap="round" />
              <path d={tpath} fill="none" stroke="rgba(255,255,255,0.85)" strokeWidth="1.6" strokeDasharray="1 4" strokeLinecap="round" />

              {sel !== null && (
                <g>
                  <line x1={xs[sel]} y1={6} x2={xs[sel]} y2={GH - 18} stroke="#fff" strokeWidth="1" opacity="0.7" />
                  <circle cx={xs[sel]} cy={iy(hours[sel].mm)} r="4.5" fill="#fff" />
                  <circle cx={xs[sel]} cy={ty(hours[sel].t)} r="3" fill="#fff" opacity="0.85" />
                </g>
              )}
            </svg>

            {sel !== null && (
              <div className="absolute bg-neutral-950/80 border border-white/10 px-2.5 py-1.5 rounded-lg shadow-lg text-[10px] font-mono pointer-events-none z-50 text-white"
                style={{
                  top: -8,
                  left: `${(xs[sel] / GW) * 100}%`,
                  transform: sel >= hours.length - 4 ? 'translateX(-100%)' : sel <= 2 ? 'none' : 'translateX(-50%)'

              >
                {hours[sel].label} · {fmt(hours[sel].t)}°
                {hours[sel].mm > 0 ? ` · ${convertPrecip(hours[sel].mm, precipUnit)} ${precipUnit}` : ` · ${hours[sel].prob}%`}

            )}

            <div className="relative h-4 mt-1 flex justify-between px-1 text-[9px] text-white/40 font-mono">
              {hours.map((h, i) => {
                if (i !== 0 && i % 6 !== 0) return null;

                return (
                  <span key={i} style={{
                    position: 'absolute', left: `${pct}%`,
                    transform: i === 0 ? 'none' : i >= hours.length - 3 ? 'translateX(-100%)' : 'translateX(-50%)'
                  }}>
                    {i === 0 ? 'Now' : h.label.replace(' ', '')}
                  </span>
                );
              })}
            </div>
          </div>
        );
      }

      // 3. Atmospheric Design View
      function HomeAtmospheric({ s, units, windSpeedUnit, precipUnit }) {

        const iy = (mm) => GH - 18 - (mm / maxMm) * (GH - 46);
        const ipts = hours.map((h, i) => [xs[i], iy(h.mm)]);
        const lastX = xs[xs.length - 1];
        const areaPath = smoothPath(ipts) + ` L ${lastX} ${GH - 18} L ${xs[0]} ${GH - 18} Z`;
        const linePath = smoothPath(ipts);

        const tMin = Math.min(...hours.map((h) => h.t));

        const tileStyle = "bg-white/10 backdrop-blur-xl border border-white/10 rounded-3xl p-5 text-white";
        const tomorrow = s.daily[1];

        return (
          <div className="flex-1 flex flex-col p-6 space-y-5 pt-16 font-sans text-white relative" style={{ background: sky.grad, minHeight: '100%' }}>

            <div className="absolute -top-16 -right-12 w-48 h-48 rounded-full pointer-events-none opacity-40 blur-2xl"

            <div className="flex justify-between items-start pt-2 z-10 relative">

                <div>

            {/* Scrub Graph Card */}
            <div className={tileStyle + " z-10"}>
              <div className="flex justify-between items-baseline mb-3">

              </div>

              <div
                ref={wrapRef}
                className="relative touch-none select-none"
                onPointerDown={(e) => {
                  e.currentTarget.setPointerCapture(e.pointerId);
                  onScrub(e.clientX);
                }}
                onPointerMove={(e) => {
                  if (e.buttons) onScrub(e.clientX);
                }}
                onPointerUp={(e) => {
                  try { e.currentTarget.releasePointerCapture(e.pointerId); } catch (err) {}
                  setSel(null);

                  try { e.currentTarget.releasePointerCapture(e.pointerId); } catch (err) {}

              >
                <svg viewBox={`0 0 ${GW} ${GH}`} width="100%" height={GH} className="block overflow-visible">

                {sel !== null && (

                    style={{
                      top: -12,
                      left: `${(xs[sel] / GW) * 100}%`,
                      transform: 'translateX(-50%)'
                    }}
                  >
                    {hours[sel].label} · {fmt(hours[sel].t)}° · {hours[sel].mm > 0 ? `${convertPrecip(hours[sel].mm, precipUnit)} ${precipUnit}` : `${hours[sel].prob}%`}

              </div>

              <div className="flex justify-between mt-2 px-1 text-[9px] opacity-60 font-mono">

                  <div className="text-[10px] opacity-60 font-bold uppercase tracking-wider">Tomorrow</div>
                  <div className="text-base font-semibold mt-0.5">
                    {tomorrow.note || (tomorrow.prob >= 50 ? 'Rain likely' : 'Dry')}

                  <div className="text-xs opacity-60">{fmt(tomorrow.loC)}°</div>

            {/* Atmosphere Stats Grid */}
            <div className="grid grid-cols-2 gap-3 z-10">
              <div className={tileStyle + " !p-4"}>
                <div className="text-[10px] opacity-65 tracking-wider uppercase font-mono">Wind</div>
                <div className="text-xl font-medium mt-1">{convertWindSpeed(s.windKmh / 3.6, windSpeedUnit)} {getWindUnitLabel(windSpeedUnit)}</div>
                <div className="text-xs opacity-60 mt-0.5">{s.windDir} wind direction</div>
              </div>
              <div className={tileStyle + " !p-4"}>
                <div className="text-[10px] opacity-65 tracking-wider uppercase font-mono">Humidity</div>

          </div>

      // 4. Bold Design View (Stripe/Linear extreme typography style)
      function HomeBold({ s, units, windSpeedUnit, precipUnit }) {
        const sky = s.sky;
        const fmt = (c) => convertTemp(c, units);
        const fmtP = (mm) => convertPrecip(mm, precipUnit);
        const phrase = precipPhrase(s);
        const hours = s.hourly;
        const [sel, setSel] = useState(0);
        const scrollRef = useRef(null);

        const BAR_W = 46;
        const white = '#fff';
        const dim = 'rgba(255,255,255,0.55)';

        const firstWet = hours.findIndex((h) => h.mm > 0);
        const lastWet = hours.reduce((a, h, i) => (h.mm > 0 ? i : a), -1);

        const handleScroll = useCallback(() => {
          if (!scrollRef.current) return;
          const { scrollLeft, clientWidth } = scrollRef.current;
          const first = Math.floor(scrollLeft / BAR_W);
          const last = Math.floor((scrollLeft + clientWidth - 1) / BAR_W);
          setSel(Math.min(Math.max(first, 0), Math.min(last, hours.length - 1)));
        }, [hours.length]);

        const panelStyle = "bg-black/25 backdrop-blur-xl border border-white/10 rounded-3xl p-5 shadow-lg text-white";
        const tomorrow = s.daily[1];
        const precipIcon = phrase.kind === 'none' ? s.cond : (s.precip.peakLabel === 'Heavy' || s.precip.peakLabel === 'Torrential' ? 'heavy' : 'rain');

        return (
          <div className="flex-1 flex flex-col p-6 space-y-4 pt-16 font-sans text-white relative" style={{ background: sky.grad, minHeight: '100%' }}>
            <div className="flex items-start justify-between">
              <div className="text-[120px] font-black tracking-tighter leading-none select-none">
                {fmt(s.tempC)}<span className="text-5xl font-bold align-top mt-2 inline-block">°</span>
              </div>
              <div className="pt-4">
                <WeatherIconDesign type={s.cond} size={66} color="#fff" accent={sky.accent} strokeWidth={1.5} />
              </div>
            </div>

            <div className="flex gap-3 items-baseline -mt-3">
              <div className="text-2xl font-extrabold tracking-tight uppercase">{s.condLabel}</div>
              <div className="flex items-center gap-2 text-xs font-mono">
                <span className="inline-flex items-center">
                  <span className="text-[9px] font-bold text-orange-400 mr-1 uppercase">High</span>
                  <span className="font-semibold">{fmt(s.hiC)}°</span>
                </span>
                <span className="opacity-30">·</span>
                <span className="inline-flex items-center">
                  <span className="text-[9px] font-bold text-sky-400 mr-1 uppercase">Low</span>
                  <span className="font-semibold">{fmt(s.loC)}°</span>
                </span>
              </div>
            </div>

            {s.severe && (
              <div className="bg-red-600 text-white rounded-2xl p-4 flex gap-3 items-start shadow-lg border border-red-500">
                <span className="text-2xl font-black shrink-0">⚠</span>
                <div>
                  <h3 className="text-sm font-black tracking-wide uppercase">{s.severe.title}</h3>
                  <p className="text-xs font-mono opacity-80 mt-1">{s.severe.sub}</p>
                </div>
              </div>
            )}

            {/* Precip Large Alert Block */}
            <div className="bg-black/30 border border-white/10 rounded-2xl p-5">
              <div className="flex items-center justify-between">
                <span className="text-xs font-mono tracking-widest opacity-60 uppercase">
                  {phrase.kind === 'none' ? 'No precipitation' : phrase.kind === 'active' ? 'Active Precip' : 'Incoming Storm'}
                </span>
                <WeatherIconDesign type={precipIcon} size={44} color="#fff" accent={sky.accent} strokeWidth={1.8} />
              </div>
              <div className="text-2xl font-extrabold tracking-tight mt-3">
                {phrase.kind === 'soon' ? (
                  <>Rain in <span style={{ color: sky.accent }}>{humanizeDur(s.precip.startsInMin ?? 0)}</span></>
                ) : phrase.kind === 'active' ? (
                  <>{s.precip.peakLabel ?? 'Heavy'} <span style={{ color: sky.accent }}>rain</span></>
                ) : 'Clear Skies'}
              </div>
              <p className="text-xs opacity-75 font-mono mt-2 leading-relaxed">
                {phrase.kind === 'none'
                  ? 'Next 12 hours dry'
                  : phrase.kind === 'active'
                    ? `Easing by ${s.precip.endLabel} · ${fmtP(s.precip.peakMm ?? 0)} ${precipUnit}`
                    : `${s.precip.startLabel} → ${s.precip.endLabel} · ${s.precip.peakLabel} · ${fmtP(s.precip.peakMm ?? 0)} ${precipUnit}`}
              </p>
            </div>

            {/* Horizontal Hourly Bar Scroller */}
            <div className="bg-black/35 rounded-2xl p-4 space-y-4">
              <div className="flex justify-between items-baseline text-[10px] font-mono opacity-60">
                <span>HOURLY TIMELINE · SCRUB</span>
                <span>{hours.length}HRS · {precipUnit.toUpperCase()}</span>
              </div>

              <div className="relative">
                <div ref={scrollRef} onScroll={handleScroll} className="flex gap-2.5 overflow-x-auto pb-2 scrollbar-none items-end">
                  {hours.map((h, i) => {
                    const norm = intensityNorm(h.mm);
                    const wet = h.mm > 0;
                    const probNorm = h.prob / 100;
                    const inWindow = firstWet >= 0 && i >= firstWet && i <= lastWet;
                    const active = i === sel;
                    return (
                      <button
                        key={i}
                        onClick={() => setSel(i)}
                        className={`flex-none w-9 flex flex-col items-center py-2.5 rounded-xl transition-all duration-150 ${active ? 'bg-white/15 text-white ring-1 ring-white/10' : 'text-neutral-400 hover:text-white'}`}
                      >
                        <span className="text-[10px] font-bold font-mono">{fmt(h.t)}°</span>
                        <div className="w-full h-16 flex items-end justify-center my-2">
                          <div
                            className="w-2 rounded-full transition-all duration-300"
                            style={{
                              height: wet ? `${10 + norm * 90}%` : h.prob >= 20 ? `${4 + probNorm * 55}%` : '8%',
                              backgroundColor: wet ? sky.accent : h.prob >= 20 ? `${sky.accent}77` : 'rgba(255,255,255,0.2)'
                            }}
                          />
                        </div>
                        <span className="text-[8px] font-mono opacity-60 uppercase">{i === 0 ? 'Now' : h.label.replace(' ', '').replace(':00', '')}</span>
                        <span className="text-[8px] mt-1 text-white/40">
                          <NavigationIcon size={8} style={{ transform: `rotate(${windDegToRotation(h.windDeg)}deg)` }} />
                        </span>
                      </button>
                    );
                  })}
                </div>
              </div>

              <div className="pt-3 border-t border-white/10 flex justify-between items-center text-xs font-mono">
                <div className="flex flex-col gap-0.5">
                  <span className="font-bold tracking-wider">{hours[sel]?.dayLabel.toUpperCase()} · {hours[sel]?.label.toUpperCase()}</span>
                  <span className="text-[10px] opacity-60 flex items-center gap-1">
                    <NavigationIcon size={10} style={{ transform: `rotate(${windDegToRotation(hours[sel]?.windDeg || 0)}deg)` }} />
                    {convertWindSpeed(hours[sel]?.windMs || 0, windSpeedUnit)} {getWindUnitLabel(windSpeedUnit).toUpperCase()}
                  </span>
                </div>
                <span className="text-[color:var(--sky-accent)] font-bold">
                  {(hours[sel]?.mm || 0) > 0 ? `${hours[sel]?.intensity.toUpperCase()} · ${fmtP(hours[sel]?.mm || 0)} ${precipUnit.toUpperCase()}` : `DRY · ${hours[sel]?.prob || 0}%`}
                </span>
              </div>
            </div>

            {/* Banners for Today and Tomorrow */}
            {s.daily[0] && (
              <div className={panelStyle + " !p-4 flex items-center justify-between"}>
                <div className="flex items-center gap-3">
                  <WeatherIconDesign type={s.daily[0].cond} size={36} color="#fff" accent={sky.accent} strokeWidth={1.6} />
                  <div>
                    <div className="text-[10px] opacity-65 uppercase tracking-wider font-mono">Today</div>
                    <div className="text-base font-bold uppercase mt-0.5">{s.daily[0].prob >= 50 ? 'Rain' : 'Dry'}</div>

                </div>
                <div className="text-right font-mono text-base font-bold">
                  {fmt(s.daily[0].hiC)}° <span className="text-white/40">/{fmt(s.daily[0].loC)}°</span>
                </div>
              </div>
            )}

            {tomorrow && (
              <div className={panelStyle + " !p-4 flex items-center justify-between"}>
                <div className="flex items-center gap-3">
                  <WeatherIconDesign type={tomorrow.cond} size={36} color="#fff" accent={sky.accent} strokeWidth={1.6} />
                  <div>
                    <div className="text-[10px] opacity-65 uppercase tracking-wider font-mono">Tomorrow</div>
                    <div className="text-base font-bold uppercase mt-0.5">{tomorrow.prob >= 50 ? 'Rain' : 'Dry'}</div>
                  </div>
                </div>
                <div className="text-right font-mono text-base font-bold">
                  {fmt(tomorrow.hiC)}° <span className="text-white/40">/{fmt(tomorrow.loC)}°</span>
                </div>
              </div>
            )}

            {/* Daily list */}
            <div className="bg-black/35 rounded-2xl p-4 divide-y divide-white/5 font-mono text-xs">
              {s.daily.slice(2).map((d, i) => (
                <div key={i} className="flex justify-between items-center py-3">
                  <span className="font-bold uppercase w-14">{d.day}</span>
                  <WeatherIconDesign type={d.cond} size={18} color="#fff" accent={sky.accent} strokeWidth={1.5} />
                  <span className="text-[10px] opacity-65 w-24 truncate">{d.note}</span>
                  <span className="font-bold text-right w-16">{fmt(d.hiC)}° / <span className="opacity-50">{fmt(d.loC)}°</span></span>
                </div>
              ))}
            </div>
          </div>
        );
      }

      // Main Skyline App Component
      function SkylineApp() {

        const [activeDesign, setActiveDesign] = useState("bold");
        const [settings, setSettings] = useState({
          tempUnit: "C",
          theme: "dark",
          windSpeedUnit: "m/s",
          precipUnit: "mm/h",
          clockFormat: "24h"
        });

        // Modals / Panels
        const [showSearch, setShowSearch] = useState(false);
        const [showSettings, setShowSettings] = useState(false);

        const s = adaptWeatherData(activeCityData, settings.clockFormat);

          const root = document.getElementById("phone-screen-root");
          if (root) {
            if (settings.theme === "dark") {
              root.classList.add("dark-theme-vars");
              root.style.setProperty("background-color", "#070a13");
            } else {
              root.classList.remove("dark-theme-vars");
              root.style.setProperty("background-color", "#fdfcfb");

          setActiveCityKey(key);

            case "atmospheric":
              return <HomeAtmospheric s={s} units={settings.tempUnit} windSpeedUnit={settings.windSpeedUnit} precipUnit={settings.precipUnit} />;
            case "bold":
            default:
              return <HomeBold s={s} units={settings.tempUnit} windSpeedUnit={settings.windSpeedUnit} precipUnit={settings.precipUnit} />;
          }

                </svg>

              >

                { key: 'minimal', label: 'Minimal' },
                { key: 'atmospheric', label: 'Atmo' },

                    key={d.key}
                    onClick={() => setActiveDesign(d.key)}
                    className={`px-3 py-1 rounded-full text-[10px] font-bold tracking-wider uppercase transition-all duration-150 ${active ? 'bg-white/20 text-white' : 'text-neutral-400 hover:text-neutral-200'}`}
                  >
                    {d.label}
                  </button>
                );
              })}
            </div>

            {/* Location Search Modal Overlay */}
            {showSearch && (
              <div className="absolute inset-0 bg-black/60 backdrop-blur-xl flex flex-col pt-16 px-6 pb-6 z-50 text-white animate-fade-in">
                <div className="flex items-center justify-between mb-6">
                  <h2 className="text-xl font-bold tracking-tight uppercase font-mono">Saved Locations</h2>
                  <button
                    onClick={() => setShowSearch(false)}
                    className="p-1 rounded-full bg-white/10 hover:bg-white/20 transition"
                  >
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2" fill="none">
                      <line x1="18" y1="6" x2="6" y2="18" />
                      <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                  </button>
                </div>

                <div className="space-y-3 overflow-y-auto flex-1 scrollbar-none">
                  {Object.keys(CITIES_DATA).map(key => {
                    const c = CITIES_DATA[key];
                    const active = activeCityKey === key;
                    return (
                      <button
                        key={key}
                        onClick={() => handleCityChange(key)}
                        className={`w-full text-left p-4 rounded-2xl border flex justify-between items-center transition ${active ? 'bg-white/15 border-white/30' : 'bg-white/5 border-white/5 hover:bg-white/10'}`}
                      >
                        <div>
                          <div className="font-extrabold text-lg">{c.city}</div>
                          <div className="text-xs opacity-60 mt-0.5">{c.timeZone}</div>
                        </div>
                        <div className="text-right">
                          <div className="text-2xl font-light">{convertTemp(c.current.temp, settings.tempUnit)}°</div>
                          <div className="text-xs opacity-70 mt-0.5">{c.current.description}</div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Settings Overlay Drawer */}
            {showSettings && (
              <div className="absolute inset-0 bg-black/60 backdrop-blur-xl flex flex-col pt-16 px-6 pb-6 z-50 text-white animate-slide-in">
                <div className="flex items-center justify-between mb-8">
                  <h2 className="text-xl font-bold tracking-tight uppercase font-mono">Settings</h2>
                  <button
                    onClick={() => setShowSettings(false)}
                    className="p-1 rounded-full bg-white/10 hover:bg-white/20 transition"
                  >
                    <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2" fill="none">
                      <line x1="18" y1="6" x2="6" y2="18" />
                      <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                  </button>
                </div>

                <div className="space-y-6 flex-1 overflow-y-auto scrollbar-none">
                  <div className="space-y-2">
                    <label className="text-xs font-bold text-neutral-400 uppercase tracking-widest font-mono">Temperature Unit</label>
                    <div className="grid grid-cols-2 gap-2">
                      {["C", "F"].map(unit => (
                        <button
                          key={unit}
                          onClick={() => setSettings(prev => ({ ...prev, tempUnit: unit }))}
                          className={`py-2 rounded-xl text-xs font-bold transition ${settings.tempUnit === unit ? 'bg-white/15 border border-white/25 text-white' : 'bg-white/5 border border-white/5 text-neutral-400'}`}
                        >
                          {unit === "C" ? "Celsius (°C)" : "Fahrenheit (°F)"}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="space-y-2">
                    <label className="text-xs font-bold text-neutral-400 uppercase tracking-widest font-mono">Visual Theme</label>
                    <div className="grid grid-cols-2 gap-2">
                      {["dark", "light"].map(theme => (
                        <button
                          key={theme}
                          onClick={() => setSettings(prev => ({ ...prev, theme }))}
                          className={`py-2 rounded-xl text-xs font-bold uppercase transition ${settings.theme === theme ? 'bg-white/15 border border-white/25 text-white' : 'bg-white/5 border border-white/5 text-neutral-400'}`}
                        >
                          {theme}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="space-y-2">
                    <label className="text-xs font-bold text-neutral-400 uppercase tracking-widest font-mono">Clock Format</label>
                    <div className="grid grid-cols-2 gap-2">
                      {["12h", "24h"].map(format => (
                        <button
                          key={format}
                          onClick={() => setSettings(prev => ({ ...prev, clockFormat: format }))}
                          className={`py-2 rounded-xl text-xs font-bold uppercase transition ${settings.clockFormat === format ? 'bg-white/15 border border-white/25 text-white' : 'bg-white/5 border border-white/5 text-neutral-400'}`}
                        >
                          {format === "12h" ? "12-Hour" : "24-Hour"}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="space-y-2">
                    <label className="text-xs font-bold text-neutral-400 uppercase tracking-widest font-mono">Wind Speed Units</label>
                    <div className="grid grid-cols-4 gap-2">
                      {["m/s", "kph", "mph", "knots"].map(unit => (
                        <button
                          key={unit}
                          onClick={() => setSettings(prev => ({ ...prev, windSpeedUnit: unit }))}
                          className={`py-2 rounded-xl text-[10px] font-bold uppercase transition ${settings.windSpeedUnit === unit ? 'bg-white/15 border border-white/25 text-white' : 'bg-white/5 border border-white/5 text-neutral-400'}`}
                        >
                          {unit}
                        </button>
                      ))}
                    </div>
                  </div>

                  <div className="space-y-2">
                    <label className="text-xs font-bold text-neutral-400 uppercase tracking-widest font-mono">Precipitation Units</label>
                    <div className="grid grid-cols-3 gap-2">
                      {["mm/h", "cm/h", "in/h"].map(unit => (
                        <button
                          key={unit}
                          onClick={() => setSettings(prev => ({ ...prev, precipUnit: unit }))}
                          className={`py-2 rounded-xl text-[10px] font-bold uppercase transition ${settings.precipUnit === unit ? 'bg-white/15 border border-white/25 text-white' : 'bg-white/5 border border-white/5 text-neutral-400'}`}
                        >
                          {unit}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="mt-auto border-t border-white/10 pt-4 text-[10px] font-mono text-neutral-500 text-center uppercase tracking-widest">
                  Skyline Weather App Redesign v2.0
                </div>
              </div>
            )}

            {/* Warnings Detail Modal */}
            {activeWarning && (
              <div
                onClick={() => setActiveWarning(null)}
                className="absolute inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center p-6 z-[60]"
              >
                <div
                  onClick={(e) => e.stopPropagation()}
                  className="bg-neutral-900 border border-white/10 w-full rounded-3xl p-6 shadow-2xl max-h-[70%] flex flex-col overflow-hidden text-white"
                >
                  <div className="flex items-center justify-between pb-4 border-b border-white/10 shrink-0">
                    <div className="flex items-center gap-2 text-red-500">
                      <AlertTriangleIcon size={18} />
                      <span className="text-xs font-black tracking-wider uppercase font-mono">
                        Active Alert
                      </span>
                    </div>
                    <button
                      onClick={() => setActiveWarning(null)}
                      className="p-1 rounded-full bg-white/10 text-white hover:bg-white/20 transition"
                    >
                      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" strokeWidth="2" fill="none">
                        <line x1="18" y1="6" x2="6" y2="18" />
                        <line x1="6" y1="6" x2="18" y2="18" />
                      </svg>
                    </button>
                  </div>

                  <div className="flex-1 overflow-y-auto pt-4 space-y-4 pr-1 scrollbar-none">
                    <h4 className="text-red-500 font-extrabold text-base leading-tight uppercase font-sans">
                      {activeWarning.title}
                    </h4>
                    <p className="text-[10px] font-mono opacity-50">
                      {activeWarning.detail}
                    </p>
                    <div className="text-xs leading-relaxed opacity-90 pt-3 border-t border-white/5 whitespace-pre-wrap">
                      {activeWarning.sub}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("app-root"));
      root.render(<SkylineApp />);
    </script>
  </body>
</html>
